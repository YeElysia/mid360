# config/mid360.yaml
common:
  lidar_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  time_sync_en: false
  time_offset_lidar_to_imu: 0.0

preprocess:
  lidar_type: 1               # Livox MID360
  point_filter_num: 1         # 降采样率
  scan_line: 6                # 激光线数
  scan_rate: 10               # 扫描频率(Hz)

feature_extract:
  N_SCAN: 6                   # 扫描线数
  Horizon_SCAN: 4000          # 水平分辨率
  edge_threshold: 1.0         # 边缘特征阈值
  surf_threshold: 0.1         # 平面特征阈值
  odometry_surface_leaf_size: 0.2  # 降采样网格大小

mapping:
  acc_cov: 0.1                # 加速度计噪声协方差
  gyr_cov: 0.1                # 陀螺仪噪声协方差
  b_acc_cov: 0.0001           # 加速度计偏置噪声
  b_gyr_cov: 0.0001           # 陀螺仪偏置噪声
  max_radius: 100.0           # 最大建图范围(m)
  pcd_save_en: true           # 启用PCD保存
  pcd_save_interval: 10       # 保存间隔(帧)
